<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Add Customer</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type=text], input[type=email], input[type=number] {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button { background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #219a52; }
        .success { color: green; padding: 10px; background: #d4edda; border-radius: 4px; margin-bottom: 15px; }
        .note { font-size: 0.85em; color: #666; margin-top: 4px; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; color: #27ae60; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <a th:href="@{/customers}">View All Customers</a>
        <a th:href="@{/customers/add}">Add New Customer</a>
    </div>

    <h1>Add Customer</h1>

    <div th:if="${message}" class="success" th:text="${message}"></div>

    <form th:action="@{/customers/add}" th:object="${customer}" method="post">
        <div class="form-group">
            <label for="webUserId">Web User ID:</label>
            <input type="number" id="webUserId" th:field="*{webUserId}" placeholder="Enter WebUser ID (join key)" required/>
            <div class="note">Must match an existing Web User ID from the WebUser service.</div>
        </div>
        <div class="form-group">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" th:field="*{firstName}" placeholder="Enter first name" required/>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" th:field="*{lastName}" placeholder="Enter last name" required/>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" placeholder="Enter email address" required/>
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" th:field="*{phone}" placeholder="Enter phone number"/>
        </div>
        <button type="submit">Save Customer</button>
    </form>
</body>
</html>
