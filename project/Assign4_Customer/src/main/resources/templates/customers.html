<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Customers</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #27ae60; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; color: #27ae60; text-decoration: none; }
        .empty { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="nav">
        <a th:href="@{/customers}">View All Customers</a>
        <a th:href="@{/customers/add}">Add New Customer</a>
    </div>

    <h1>Registered Customers</h1>

    <div th:if="${#lists.isEmpty(customers)}" class="empty">No customers registered yet.</div>

    <table th:if="${!#lists.isEmpty(customers)}">
        <thead>
            <tr>
                <th>Customer ID</th>
                <th>Web User ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${customers}">
                <td th:text="${c.customerId}"></td>
                <td th:text="${c.webUserId}"></td>
                <td th:text="${c.firstName}"></td>
                <td th:text="${c.lastName}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.phone}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
