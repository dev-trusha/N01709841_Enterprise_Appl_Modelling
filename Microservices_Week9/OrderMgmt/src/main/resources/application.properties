# ============================
# OrderMgmt - Runs on Port 8080
# ============================
server.port=8080
spring.application.name=OrderMgmt

# ============================
# MySQL Database Connection
# Change password if yours is different
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/ordermgmt_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate Settings
# update = creates tables if they don't exist, keeps existing data
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================
# URLs for other microservices
# ============================
acct.service.url=http://localhost:8081
fee.service.url=http://localhost:8082
market.service.url=http://localhost:8083
