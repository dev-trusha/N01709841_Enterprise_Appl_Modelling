<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Management System</title>
    <!-- Bootstrap for nice styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1 class="mb-3">Order Management System</h1>
    <p class="text-muted">Microservice running on <strong>Port 8080</strong></p>

    <!-- Button to place a new order -->
    <a href="/orders/new" class="btn btn-primary mb-3">+ Place New Order</a>

    <!-- Table showing all orders from the database -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Stock</th>
                <th>Price ($)</th>
                <th>Quantity</th>
                <th>Account</th>
                <th>Total Value ($)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- th:each loops through the list of orders from the controller -->
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderId}"></td>
                <td th:text="${order.date}"></td>
                <td th:text="${order.stockQuote}"></td>
                <td th:text="${order.price}"></td>
                <td th:text="${order.quantity}"></td>
                <td th:text="${order.accountId}"></td>
                <!-- Calculate total value inline -->
                <td th:text="${order.price * order.quantity}"></td>
                <td>
                    <a th:href="@{/orders/{id}/detail(id=${order.orderId})}"
                       class="btn btn-info btn-sm">View Details</a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Show message if no orders exist yet -->
    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-warning">
        No orders yet. Click "Place New Order" to get started!
    </div>

</div>
</body>
</html>
