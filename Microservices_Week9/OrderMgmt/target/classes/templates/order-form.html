<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Place New Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h2>Place New Stock Order</h2>
    <p class="text-muted">This form will save the order AND notify AcctMgmt, FeeMgmt, and MarketMgmt.</p>

    <!-- th:action maps to POST /orders/save -->
    <!-- th:object binds to the Order object from the controller -->
    <form th:action="@{/orders/save}" th:object="${order}" method="post">

        <div class="mb-3">
            <label class="form-label">Date</label>
            <!-- th:field binds to order.date -->
            <input type="text" th:field="*{date}" class="form-control"
                   placeholder="e.g. 2026-03-16" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock Quote (Symbol)</label>
            <input type="text" th:field="*{stockQuote}" class="form-control"
                   placeholder="e.g. AAPL, TSLA, MSFT" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Price per Share ($)</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control"
                   placeholder="e.g. 150.50" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity (Number of Shares)</label>
            <input type="number" th:field="*{quantity}" class="form-control"
                   placeholder="e.g. 100" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Account ID</label>
            <input type="text" th:field="*{accountId}" class="form-control"
                   placeholder="e.g. ABC" required/>
        </div>

        <button type="submit" class="btn btn-success">Submit Order</button>
        <a href="/orders" class="btn btn-secondary ms-2">Cancel</a>
    </form>

</div>
</body>
</html>
